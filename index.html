<!DOCTYPE html>
<html lang="en">

<head>

    <title>Flipkart</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1 id="flipkart">flipkart</h1>

        <h1 id="fashion">FASHION SALE</h1>
        <P>Up to 50% on New Arrivals..</P>
        <button>Shop now</button>
    </div>

    <div class="parent">

        <img src="./images/mobile.png">
        <h1>Mobile</h1>
        <b>Oppo</b>
        <p>256/12GB</p>
        <p>35000</p>
        <button>add product</button>
    </div>
    <div class="card">
        <img src="./images/laptop.png" id="img2">
        <h1>Laptop</h1>
        <b>HP</b>
        <p>13th gen i5</p>
        <p>65000</p>
        <button>add product</button>
    </div>
    <div class="card">
        <img src="./images/watch.webp" id="img3">
        <h1>Watch</h1>
        <b>fire boult</b>
        <p>MTP-V300</p>
        <p>2500</p>
        <button>add product</button>
    </div>
    </div>
    <p id="made">⭐⭐⭐Made by @Raneeth Rao⭐⭐⭐</p>
